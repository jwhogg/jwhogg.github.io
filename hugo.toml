[params]
# Meta description
description = "Joel's Personal Website"
gtm_id = "G-VHFF3CGGEV"

# Appearance settings
theme = 'light'

# Intro on main page, content is markdown
homeIntroTitle = "Hi, I'm Joel 👋"
homeIntroContent = """
This is a space for me to post notes, research, and longer articles on a varitey of subjects- mostly keeping within tech.

I'm a [PhD student at the University of Sheffield](https://sheffield.ac.uk/made4manufacturing/people/current-projects/joel-hogg), researching applying Causal Inference to Manufacturing. Currently, I'm developing [why-rs](https://github.com/jwhogg/why-rs), a Rust library for Causal Inference and Causal Discovery.

In the future, I hope to post some blogs about Causal Inference research as a learn more.

To see what I've been working on, checkout my [portfolio](/portfolio).
"""
